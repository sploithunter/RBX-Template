# mise configuration for Roblox development tools
# https://mise.jdx.dev/

[tools]
# Rojo for file sync between IDE and Roblox Studio
"github:rojo-rbx/rojo" = { version = "7.6.1", exe = "rojo" }

# Wally for package management
"github:UpliftGames/wally" = { version = "0.3.2", exe = "wally" }

# Selene for Lua linting
"github:Kampfkarren/selene" = { version = "0.25.0", exe = "selene" }

# StyLua for code formatting
stylua = "0.18.2"

[env]
# Environment variables for development
ROJO_PORT = "34872"
WALLY_REGISTRY = "https://github.com/UpliftGames/wally-index"

[tasks.install]
description = "Install all development dependencies"
run = [
    "mise install",
    "wally install"
]

[tasks.serve]
description = "Start Rojo file sync server"
run = "rojo serve"

[tasks.build]
description = "Build the project for production"
run = "rojo build --output game.rbxl"

[tasks.asset-report]
description = "Report tracked pet assets and source-file gaps"
run = "node scripts/assets_report.js"

[tasks.asset-check]
description = "Check pet asset manifest against configs/pets.lua"
run = "node scripts/assets_report.js --check"

[tasks.asset-prompts]
description = "Print Meshy-ready prompts from the pet manifest"
run = "node scripts/assets_report.js --prompts"

[tasks.test]
description = "Run tests (requires Studio)"
run = "echo 'Run tests/TestBootstrap.lua in Roblox Studio'"

[tasks.lint]
description = "Lint Lua files with Selene, failing on errors"
run = "selene --allow-warnings src configs tests"

[tasks.lint-strict]
description = "Lint Lua files with Selene, failing on warnings"
run = "selene src configs tests"

[tasks.format]
description = "Format Lua files with StyLua"
run = "stylua src/"

[tasks.dev]
description = "Start development environment"
depends = ["install", "serve"] 
