# mise configuration for Roblox development tools
# https://mise.jdx.dev/

[tools]
# Rojo for file sync between IDE and Roblox Studio
"github:rojo-rbx/rojo" = { version = "7.6.1", exe = "rojo" }

# Wally for package management
"github:UpliftGames/wally" = { version = "0.3.2", exe = "wally" }

# Selene for Lua linting
"github:Kampfkarren/selene" = { version = "0.25.0", exe = "selene" }

# StyLua for code formatting
stylua = "0.18.2"

# Lune standalone Luau runtime for headless (no-Studio) pure-logic unit tests
"github:lune-org/lune" = { version = "0.10.4", exe = "lune" }

[env]
# Environment variables for development
ROJO_PORT = "34872"
WALLY_REGISTRY = "https://github.com/UpliftGames/wally-index"

[tasks.install]
description = "Install all development dependencies"
run = [
    "mise install",
    "wally install"
]

[tasks.serve]
description = "Start Rojo file sync server"
run = "rojo serve"

[tasks.build]
description = "Build the project for production"
run = "rojo build --output game.rbxl"

[tasks.release]
description = "Publish to Roblox via Open Cloud (rojo upload). Needs ROBLOX_OPEN_CLOUD_KEY/UNIVERSE_ID/PLACE_ID env; refuses if unset. DRY_RUN=1 to validate only."
run = "bash scripts/release.sh"

[tasks.asset-report]
description = "Report tracked pet assets and source-file gaps"
run = "node scripts/assets_report.js"

[tasks.asset-check]
description = "Check pet asset manifest against configs/pets.lua"
run = "node scripts/assets_report.js --check"

[tasks.asset-prompts]
description = "Print Meshy-ready prompts from the pet manifest"
run = "node scripts/assets_report.js --prompts"

[tasks.asset-meshy]
description = "Run the local Meshy developer asset helper"
run = "node scripts/meshy_asset.js"

[tasks.asset-balance]
description = "Show Meshy API credit balance"
run = "node scripts/meshy_asset.js balance"

[tasks.test]
description = "Run tests (requires Studio)"
run = "echo 'Run tests/TestBootstrap.lua in Roblox Studio'"

[tasks.test-headless]
description = "Run headless pure-logic unit tests with lune (no Studio required)"
run = "lune run tests/headless/run.luau"

[tasks.fmt-check]
description = "StyLua --check on pipeline-owned paths (whole-repo stylua is a separate cleanup lane)"
run = "mise exec -- stylua --check src/Shared/API src/Server/Services/GameAPIService.lua src/Server/Services/AutomationService.lua tests/headless"

# Tools are invoked via `mise exec --` so they resolve identically in local
# shells and on CI runners (a bare tool name can hit a PATH/permission quirk
# inside `mise run` on hosted runners).
[tasks.ci]
description = "Fast gate (no Studio): selene errors + format (owned paths) + rojo build + headless tests"
run = [
    "mise exec -- selene --allow-warnings src configs tests",
    "mise exec -- stylua --check src/Shared/API src/Server/Services/GameAPIService.lua src/Server/Services/AutomationService.lua tests/headless",
    "mise exec -- rojo build --output game.rbxl",
    "mise exec -- lune run tests/headless/run.luau",
]

[tasks.lint]
description = "Lint Lua files with Selene, failing on errors"
run = "selene --allow-warnings src configs tests"

[tasks.lint-strict]
description = "Lint Lua files with Selene, failing on warnings"
run = "selene src configs tests"

[tasks.format]
description = "Format Lua files with StyLua"
run = "stylua src/"

[tasks.dev]
description = "Start development environment"
depends = ["install", "serve"] 
